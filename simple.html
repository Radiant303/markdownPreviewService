<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- MathJax 配置（必须在脚本前） -->
        <script>
            window.MathJax = {
                tex: {
                    inlineMath: [["$", "$"]],
                    displayMath: [["$$", "$$"]],
                },
            };
        </script>

        <!-- MathJax 主脚本（失败也不影响页面） -->
        <script defer src="http://10.0.0.10:9748/tex-mml-svg.js"></script>

        <!-- Markdown / 高亮 -->
        <link
            rel="stylesheet"
            href="http://10.0.0.10:9748/github-dark.min.css"
        />
        <script src="http://10.0.0.10:9748/marked.min.js"></script>
        <script src="http://10.0.0.10:9748/highlight.min.js"></script>

        <style>
            /* ==========================================
           本地霞鹜文楷字体定义
           ========================================== */

            /* 正文版本 - LXGW WenKai */
            @font-face {
                font-family: "LXGW WenKai";
                src: url("http://10.0.0.10:9748/LXGWWenKai-Light.woff2")
                    format("woff2");
                font-weight: 300;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: "LXGW WenKai";
                src: url("http://10.0.0.10:9748/LXGWWenKai-Regular.woff2")
                    format("woff2");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: "LXGW WenKai";
                src: url("http://10.0.0.10:9748/LXGWWenKai-Medium.woff2")
                    format("woff2");
                font-weight: 500;
                font-style: normal;
                font-display: swap;
            }

            /* 等宽版本 - LXGW WenKai Mono */
            @font-face {
                font-family: "LXGW WenKai Mono";
                src: url("http://10.0.0.10:9748/LXGWWenKaiMono-Light.woff2")
                    format("woff2");
                font-weight: 300;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: "LXGW WenKai Mono";
                src: url("http://10.0.0.10:9748/LXGWWenKaiMono-Regular.woff2")
                    format("woff2");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }

            @font-face {
                font-family: "LXGW WenKai Mono";
                src: url("http://10.0.0.10:9748/LXGWWenKaiMono-Medium.woff2")
                    format("woff2");
                font-weight: 500;
                font-style: normal;
                font-display: swap;
            }

            :root {
                /* 果粒色彩系统 */
                --color-bg: #ffffff;
                --color-text: #1d1d1f;
                --color-text-secondary: #86868b;
                --color-border: #d2d2d7;
                --color-surface: #f5f5f7;
                --color-link: #0066cc;
                --color-seed: #ff9500;

                /* 圆角系统 */
                --radius-container: 24px;
                --radius-inner: 12px;
                --radius-seed: 50%;

                /* 字体系统 - 手写体优先 */
                --font-handwriting:
                    "LXGW WenKai", "PingFang SC", "Microsoft YaHei", sans-serif;
                --font-sans:
                    "LXGW WenKai", -apple-system, BlinkMacSystemFont,
                    "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                --font-mono:
                    "LXGW WenKai Mono", "SF Mono", SFMono-Regular, ui-monospace,
                    Menlo, Monaco, Consolas, monospace;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            body {
                font-family: var(--font-handwriting);
                /* 手写体适当增大行高，让笔画呼吸 */
                font-size: 34px;
                line-height: 1.9;
                color: var(--color-text);
                background-color: var(--color-surface);
                /* 手写体通常需要稍宽松的字间距 */
                letter-spacing: 0.02em;
            }

            /* 容器 - 严格参考第三份代码的宽高比 */
            .main-wrapper {
                width: 100%;
                padding: 40px 24px;
                display: flex;
                justify-content: center;
            }

            .card {
                width: 100%;
                max-width: 1200px;
                background: var(--color-bg);
                border-radius: var(--radius-container);
                overflow: hidden;
                position: relative;
                box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
            }

            /* 头部 - 严格参考第三份代码的 60px 60px 20px 60px */
            .header-container {
                padding: 60px 60px 20px 60px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .meta-item {
                font-family: var(--font-mono);
                font-size: 0.75em;
                /* 相对34px基础字号 */
                font-weight: 600;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                color: var(--color-text-secondary);
                display: flex;
                align-items: center;
                gap: 12px;
                display: inline-flex;
                align-items: center;
                gap: 12px; /* 让 WORDS 和 PRO 之间保持 12px 的精致间距 */
            }

            .seed-mark {
                width: 8px;
                height: 8px;
                border-radius: var(--radius-seed);
                background: var(--color-seed);
                flex-shrink: 0;
            }

            /* 内容区 - 严格参考第三份代码: 20px 60px 60px 60px */
            .markdown-body {
                padding: 20px 60px 60px 60px;
            }

            /* 标题系统 - 手写体标题更有温度 */
            h1 {
                font-family: var(--font-handwriting);
                font-size: 2.2em;
                font-weight: 700;
                line-height: 1.4;
                letter-spacing: 0.03em;
                color: #000;
                margin-bottom: 0.8em;
                margin-top: 0;
                /* 手写体添加轻微倾斜，模拟自然书写 */
                transform: skewX(-1deg);
            }

            h2 {
                font-family: var(--font-handwriting);
                font-size: 1.6em;
                font-weight: 700;
                letter-spacing: 0.02em;
                line-height: 1.35;
                margin-top: 1.6em;
                margin-bottom: 0.8em;
                color: #111;
                position: relative;
            }

            /* H2 左侧装饰条 - 类似第三份代码风格 */
            h2::before {
                content: "";
                position: absolute;
                left: -24px;
                top: 0.25em;
                bottom: 0.25em;
                width: 6px;
                background: var(--color-seed);
                border-radius: 4px;
            }

            h3 {
                font-family: var(--font-handwriting);
                font-size: 1.3em;
                font-weight: 600;
                letter-spacing: 0.02em;
                line-height: 1.4;
                margin-top: 1.4em;
                margin-bottom: 0.8em;
                color: #333;
            }

            h4,
            h5,
            h6 {
                font-family: var(--font-handwriting);
                font-size: 1.1em;
                font-weight: 600;
                letter-spacing: 0.02em;
                margin-top: 1.4em;
                margin-bottom: 0.6em;
                color: var(--color-text);
            }

            /* 正文 - 手写体优化 */
            p {
                font-family: var(--font-handwriting);
                font-size: 1em;
                line-height: 1.9;
                color: #475569;
                margin-bottom: 1.4em;
                text-align: justify;
                /* 手写体文本轻微倾斜，更自然 */
                transform: skewX(-0.5deg);
            }

            /* 强调 - 手写体的荧光笔效果更有手绘感 */
            strong {
                font-family: var(--font-handwriting);
                font-weight: 700;
                color: var(--color-text);
                background: linear-gradient(
                    180deg,
                    transparent 60%,
                    rgba(255, 149, 0, 0.4) 60%
                );
                padding: 0 6px;
                border-radius: 4px;
                -webkit-box-decoration-break: clone;
                box-decoration-break: clone;
                letter-spacing: 0.03em;
            }

            em {
                font-family: var(--font-handwriting);
                font-style: italic;
                letter-spacing: 0.03em;
            }

            /* 引用块 - 玻璃拟态风格 + 手写体 */
            blockquote {
                margin: 2em 0;
                padding: 1.5em 2em;
                background: linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.95) 0%,
                    rgba(245, 245, 247, 0.7) 100%
                );
                border-radius: 24px;
                border-left: none;
                font-family: var(--font-handwriting);
                font-style: italic;
                color: #374151;
                box-shadow:
                    0 4px 20px rgba(0, 0, 0, 0.05),
                    inset 0 1px 0 rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                position: relative;
                border: 1px solid rgba(255, 255, 255, 0.6);
                /* 引用块添加手写旋转感 */
                transform: rotate(-0.5deg);
            }

            blockquote::before {
                content: '"';
                position: absolute;
                top: -0.1em;
                left: 0.3em;
                font-size: 4em;
                color: var(--color-seed);
                opacity: 0.4;
                font-family: var(--font-handwriting);
                line-height: 1;
                font-weight: 700;
            }

            blockquote p {
                margin: 0;
                font-size: 1em;
                line-height: 1.7;
                color: inherit;
                position: relative;
                z-index: 1;
                transform: none;
                /* 重置p的倾斜，避免双重倾斜 */
            }

            /* 链接 */
            a {
                font-family: var(--font-handwriting);
                color: var(--color-link);
                text-decoration: none;
                border-bottom: 2px solid rgba(0, 102, 204, 0.2);
                transition: all 0.3s ease;
            }

            a:hover {
                color: var(--color-seed);
                border-bottom-color: var(--color-seed);
                text-decoration: none;
            }

            /* 图片 */
            img {
                max-width: 100%;
                border-radius: 12px;
                margin: 2em auto;
                display: block;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
                border: 1px solid rgba(0, 0, 0, 0.05);
            }

            /* 代码块 - 保持等宽，但注释等可用手写体 */
            pre {
                background: #333333;
                border-radius: 12px;
                padding: 50px 30px 30px 30px;
                margin: 2em 0;
                overflow-x: auto;
                position: relative;
                color: #e2e8f0;
                border: 1px solid #444;
            }

            pre::before {
                content: "";
                position: absolute;
                top: 22px;
                left: 24px;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: #ff5f56;
                box-shadow:
                    20px 0 0 #ffbd2e,
                    40px 0 0 #27c93f;
            }

            code {
                font-family: var(--font-mono);
                font-size: 0.85em;
                line-height: 1.6;
                white-space: pre-wrap;
                word-break: break-all;
            }

            pre code {
                display: block;
                background: transparent;
                padding: 0;
                color: #e2e8f0;
                font-size: 0.8em;
                line-height: 1.6;
            }

            /* 行内代码 - 手写体中的等宽高亮 */
            p code,
            li code {
                font-family: var(--font-mono);
                background: rgba(255, 149, 0, 0.15);
                color: #d9480f;
                padding: 4px 8px;
                border-radius: 6px;
                font-size: 0.8em;
                margin: 0 4px;
                letter-spacing: 0;
            }

            /* 列表 - 手写体优化 */
            ul,
            ol {
                margin: 1.5em 0;
                padding-left: 1.4em;
            }

            li {
                margin-bottom: 0.6em;
                font-size: 1em;
                line-height: 1.8;
                color: #475569;
                font-family: var(--font-handwriting);
            }

            ul li {
                list-style-type: none;
                position: relative;
            }

            /* 手写感项目符号 - 用小圆点模拟墨水点 */
            ul li::before {
                content: "";
                position: absolute;
                left: -1.3em;
                top: 0.6em;
                width: 10px;
                height: 10px;
                border-radius: 50% 60% 40% 50% / 50% 50% 60% 40%;
                /* 不规则圆，像墨点 */
                background: var(--color-seed);
                opacity: 0.8;
                transform: rotate(-15deg);
            }

            ol li {
                padding-left: 0.3em;
            }

            li::marker {
                color: var(--color-seed);
                font-family: var(--font-handwriting);
                font-weight: 600;
            }

            /* 嵌套列表 */
            ul ul,
            ol ol,
            ul ol,
            ol ul {
                margin: 0.5em 0;
            }

            /* 表格 - 手写体 */
            table {
                width: 100%;
                border-collapse: collapse;
                margin: 2em 0;
                font-size: 0.9em;
                font-family: var(--font-handwriting);
            }

            thead {
                border-bottom: 2px solid var(--color-border);
            }

            th {
                font-weight: 700;
                font-size: 0.75em;
                letter-spacing: 0.03em;
                text-transform: uppercase;
                color: var(--color-text-secondary);
                padding: 0.8em 1em 0.8em 0;
                text-align: left;
                font-family: var(--font-handwriting);
            }

            td {
                padding: 0.8em 1em 0.8em 0;
                border-bottom: 1px solid var(--color-border);
                line-height: 1.6;
            }

            tr:last-child td {
                border-bottom: none;
            }

            /* 分割线 - 手绘感 */
            hr {
                border: none;
                height: 2px;
                background: linear-gradient(
                    90deg,
                    transparent 0%,
                    var(--color-border) 10%,
                    var(--color-seed) 50%,
                    var(--color-border) 90%,
                    transparent 100%
                );
                margin: 2.5em 0;
                position: relative;
                opacity: 0.6;
                /* 轻微波浪效果 */
                transform: rotate(-0.3deg);
            }

            /* 页脚 */
            .footer {
                margin: 0 60px 50px 60px;
                padding-top: 30px;
                border-top: none;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 12px;
                position: relative;
            }

            .footer::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    #e2e8f0 20%,
                    #e2e8f0 80%,
                    transparent
                );
                opacity: 0.5;
            }

            .seed {
                width: 10px;
                height: 10px;
                border-radius: 50% 60% 40% 50% / 50% 50% 60% 40%;
                background: var(--color-seed);
                opacity: 0.8;
                transform: rotate(var(--rotation, 0deg));
            }

            .seed:nth-child(2) {
                --rotation: 120deg;
            }

            .seed:nth-child(3) {
                --rotation: 240deg;
            }

            /* MathJax - 数学公式样式适配 */
            mjx-container {
                font-size: 1.1em;
                color: var(--color-text);
            }

            mjx-container[display="true"] {
                margin: 2em 0;
                overflow-x: auto;
                padding: 1.5em;
                background: rgba(255, 255, 255, 0.5);
                border-radius: 12px;
            }

            mjx-container {
                transform: none !important;
            }

            /* 响应式 - 手写体在移动端需要更好的可读性 */
            @media (max-width: 800px) {
                .main-wrapper {
                    padding: 0;
                }

                .card {
                    border-radius: 0;
                    max-width: 100%;
                    box-shadow: none;
                }

                .markdown-body {
                    padding: 20px 30px 40px 30px;
                }

                .header-container {
                    padding: 30px 30px 20px 30px;
                }

                /* 移动端手写体适当减小字号，保持清晰 */
                body {
                    font-size: 22px;
                    line-height: 1.85;
                }

                h1 {
                    font-size: 1.7em;
                    transform: none;
                    /* 移动端取消倾斜，更易读 */
                }

                h2 {
                    font-size: 1.35em;
                }

                h2::before {
                    left: -18px;
                    width: 4px;
                }

                h3 {
                    font-size: 1.15em;
                }

                .footer {
                    margin: 0 30px 40px 30px;
                }

                blockquote {
                    padding: 1.2em 1.5em;
                    transform: none;
                    /* 移动端取消旋转 */
                }

                p {
                    transform: none;
                    /* 移动端取消倾斜 */
                }
            }

            /* 语法高亮 - 适配深色代码块 */
            .hljs {
                background: transparent !important;
                color: #e2e8f0 !important;
            }

            .hljs-keyword,
            .hljs-operator {
                font-weight: 600;
                color: #ff7b72 !important;
            }

            .hljs-string,
            .hljs-regexp,
            .hljs-addition,
            .hljs-attribute {
                color: #a5d6ff !important;
            }

            .hljs-comment,
            .hljs-quote {
                color: #8b949e !important;
                font-family: var(--font-handwriting);
                /* 注释用手写体更有笔记感 */
                font-style: italic;
            }

            .hljs-number,
            .hljs-literal {
                color: #79c0ff !important;
            }

            .hljs-function,
            .hljs-title {
                font-weight: 600;
                color: #d2a8ff !important;
            }
            /* === Pro 专属高级标签（极简高细线） === */
            .pro-tag {
                font-family: var(--font-mono);
                font-size: 0.55em;
                font-weight: 700;
                letter-spacing: 0.1em;
                color: var(--color-seed);
                /* 极细的 1px 橙色边框 */
                border: 1px solid var(--color-seed);
                padding: 1px 8px;
                border-radius: 4px;
                margin-left: 12px;
                display: inline-flex;
                align-items: center;
                line-height: 1.2;
                background: transparent;
                opacity: 0.9;
                transform: skewX(-1deg);
            }
        </style>

        <base target="_blank" />
    </head>

    <body>
        <div class="main-wrapper">
            <div class="card">
                <header class="header-container">
                    <span class="meta-item">
                        <span class="seed-mark"></span>
                        <span id="current-date">DATE</span>
                    </span>
                    <span class="meta-item">
                        <span id="word-count">WORDS</span>
                        <span class="pro-tag">PRO</span>
                    </span>
                </header>

                <article id="content" class="markdown-body"></article>

                <footer class="footer">
                    <span class="seed"></span>
                    <span class="seed"></span>
                    <span class="seed"></span>
                </footer>
            </div>
        </div>

        <pre id="md-source" style="display: none">{{ text | safe }}</pre>

        <script>
            /* ======================
           Markdown 原始内容
           ====================== */
            const rawDoc = document.getElementById("md-source").textContent;

            function normalizeMarkdownInput(input) {
                return input
                    .trim()
                    .replace(/\r\n?/g, "\n")
                    .replace(/\\r\\n/g, "\n")
                    .replace(/\\n/g, "\n")
                    .replace(/\\`/g, "`")
                    .replace(/\\'/g, "'")
                    .replace(/\\"/g, '"');
            }

            const doc = normalizeMarkdownInput(rawDoc);

            /* 防止 marked 干扰 */
            marked.setOptions({
                gfm: true,
                mangle: false,
                headerIds: false,
            });
            const contentBox = document.getElementById("content");

            /* ======================
           工具函数
           ====================== */

            function updateMetaFromMarkdown(md) {
                /* 日期 - 强制使用北京时间 */
                const now = new Date();
                // 使用 toLocaleDateString 指定时区，避免手动计算月份和日期导致的时区偏差
                const dateStr = now
                    .toLocaleDateString("zh-CN", {
                        timeZone: "Asia/Shanghai",
                        year: "numeric",
                        month: "2-digit",
                        day: "2-digit",
                    })
                    .replace(/\//g, "."); // 将 2026/03/02 替换为 2026.03.02

                document.getElementById("current-date").textContent = dateStr;

                /* 字数统计逻辑保持不变 */
                const text = md.replace(/\r?\n/g, "").replace(/\s+/g, "");

                const len = text.length;
                document.getElementById("word-count").textContent =
                    len >= 1000
                        ? (len / 1000).toFixed(1) + "k WORDS"
                        : len + " WORDS";
            }

            function escapeHtml(str) {
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function protectCodeFences(md) {
                const codeBlocks = [];
                const lines = md.split("\n");
                const output = [];
                let inFence = false;
                let fenceLang = "";
                let fenceLines = [];

                for (const line of lines) {
                    const openMatch = line.match(/^\s*```([\w-]*)\s*$/);

                    if (!inFence && openMatch) {
                        inFence = true;
                        fenceLang = (openMatch[1] || "").trim();
                        fenceLines = [];
                        continue;
                    }

                    if (inFence && /^\s*```\s*$/.test(line)) {
                        const index = codeBlocks.length;
                        codeBlocks.push({
                            lang: fenceLang,
                            code: fenceLines.join("\n"),
                        });
                        output.push("", `@@CODE_BLOCK_${index}@@`, "");
                        inFence = false;
                        fenceLang = "";
                        fenceLines = [];
                        continue;
                    }

                    if (inFence) {
                        fenceLines.push(line);
                    } else {
                        output.push(line);
                    }
                }

                if (inFence) {
                    output.push(`\`\`\`${fenceLang}`);
                    output.push(...fenceLines);
                }

                return { protectedMd: output.join("\n"), codeBlocks };
            }

            function renderCodeBlock(block) {
                const langClass = block.lang
                    ? ` class="language-${escapeHtml(block.lang)}"`
                    : "";
                return `<pre><code${langClass}>${escapeHtml(block.code)}</code></pre>`;
            }

            function restoreCodeFences(html, codeBlocks) {
                return html.replace(
                    /<p>@@CODE_BLOCK_(\d+)@@<\/p>|@@CODE_BLOCK_(\d+)@@/g,
                    (_, pIndex, rawIndex) => {
                        const index = Number(pIndex ?? rawIndex);
                        return renderCodeBlock(codeBlocks[index]);
                    },
                );
            }

            /* ======================
           主渲染流程（顺序很重要）
           ====================== */
            /* 渲染 */
            const { protectedMd, codeBlocks } = protectCodeFences(doc);
            contentBox.innerHTML = restoreCodeFences(
                marked.parse(protectedMd),
                codeBlocks,
            );

            /* 更新元数据（日期和字数）- 必须在渲染后调用 */
            updateMetaFromMarkdown(doc);

            /* MathJax 渲染 */
            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise([contentBox]).then(() => {
                    contentBox
                        .querySelectorAll("pre code")
                        .forEach((el) => hljs.highlightElement(el));
                });
            } else {
                contentBox
                    .querySelectorAll("pre code")
                    .forEach((el) => hljs.highlightElement(el));
            }
        </script>
    </body>
</html>
